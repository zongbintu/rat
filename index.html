<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>可转债工具台</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f3;
        --surface: #ffffff;
        --surface-soft: #f1f5f2;
        --ink: #1f2a28;
        --muted: #66736f;
        --line: #dce3de;
        --primary: #186b5f;
        --primary-strong: #0f4f46;
        --accent: #b95c38;
        --blue: #3c6f9f;
        --danger: #a12d2a;
        --danger-bg: #fff0ef;
        --focus: rgba(24, 107, 95, 0.16);
        --shadow: 0 18px 42px rgba(31, 42, 40, 0.1);
        font-family:
          Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.86),
            rgba(246, 247, 243, 0.94)
          ),
          var(--bg);
      }

      button,
      input {
        font: inherit;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 8px;
        color: #fff;
        background: var(--primary);
        box-shadow: 0 10px 22px rgba(24, 107, 95, 0.2);
      }

      .brand-mark svg {
        width: 24px;
        height: 24px;
      }

      h1 {
        font-size: clamp(24px, 3vw, 34px);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.14;
      }

      .subtitle {
        margin-top: 5px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .tabs {
        display: inline-flex;
        overflow: hidden;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfa;
      }

      .tab {
        min-height: 40px;
        border: 0;
        border-right: 1px solid var(--line);
        padding: 0 14px;
        color: var(--muted);
        background: transparent;
        cursor: pointer;
      }

      .tab:last-child {
        border-right: 0;
      }

      .tab.is-active {
        color: #fff;
        background: var(--primary);
      }

      .view {
        display: none;
      }

      .view.is-active {
        display: block;
      }

      .tool-grid {
        display: grid;
        grid-template-columns: minmax(300px, 0.88fr) minmax(0, 1.45fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .panel-pad {
        padding: 20px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 18px 20px;
      }

      .panel-head h2,
      .panel-pad h2 {
        font-size: 18px;
        font-weight: 730;
        letter-spacing: 0;
        line-height: 1.25;
      }

      .panel-head p {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .pill {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 7px 10px;
        color: #7a381f;
        background: #fff0e7;
        font-size: 13px;
        font-weight: 760;
      }

      .field {
        position: relative;
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 680;
      }

      .control {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 13px;
        color: var(--ink);
        background: #fff;
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--focus);
      }

      .search-wrap {
        position: relative;
      }

      .search-input {
        padding-right: 42px;
      }

      .search-icon {
        position: absolute;
        top: 50%;
        right: 14px;
        width: 18px;
        height: 18px;
        color: var(--muted);
        transform: translateY(-50%);
        pointer-events: none;
      }

      .suggestions {
        position: absolute;
        z-index: 10;
        top: calc(100% + 6px);
        right: 0;
        left: 0;
        display: none;
        max-height: 244px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 16px 30px rgba(31, 42, 40, 0.14);
      }

      .suggestions.is-open {
        display: block;
      }

      .suggestion {
        display: grid;
        width: 100%;
        grid-template-columns: 78px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        min-height: 46px;
        border: 0;
        border-bottom: 1px solid var(--line);
        padding: 9px 12px;
        color: var(--ink);
        background: transparent;
        text-align: left;
        cursor: pointer;
      }

      .suggestion:last-child {
        border-bottom: 0;
      }

      .suggestion:hover,
      .suggestion:focus {
        background: var(--surface-soft);
        outline: none;
      }

      .suggestion-code {
        font-variant-numeric: tabular-nums;
        font-weight: 760;
      }

      .suggestion-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .suggestion.has-detail {
        min-height: 54px;
      }

      .suggestion-main {
        display: grid;
        min-width: 0;
        gap: 3px;
      }

      .suggestion-detail {
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tag {
        border-radius: 999px;
        padding: 4px 8px;
        color: var(--primary-strong);
        background: #e5f0ec;
        font-size: 12px;
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 0 16px;
        cursor: pointer;
        transition:
          transform 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .btn:disabled {
        cursor: progress;
        opacity: 0.72;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-primary {
        flex: 1;
        color: #fff;
        background: var(--primary);
        box-shadow: 0 12px 22px rgba(24, 107, 95, 0.2);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--primary-strong);
      }

      .btn svg {
        width: 18px;
        height: 18px;
      }

      .message {
        display: none;
        margin-top: 14px;
        border-radius: 8px;
        padding: 10px 12px;
        color: var(--primary-strong);
        background: #e5f0ec;
        font-size: 13px;
        line-height: 1.45;
      }

      .message.is-visible {
        display: block;
      }

      .message.is-error {
        color: var(--danger);
        background: var(--danger-bg);
      }

      .empty {
        display: grid;
        min-height: 312px;
        place-items: center;
        padding: 30px;
        color: var(--muted);
        text-align: center;
      }

      .empty[hidden] {
        display: none;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        background: var(--line);
      }

      .stat {
        min-height: 98px;
        padding: 16px;
        background: var(--surface);
      }

      .stat p {
        color: var(--muted);
        font-size: 13px;
        font-weight: 680;
        line-height: 1.35;
      }

      .stat strong {
        display: block;
        margin-top: 8px;
        font-size: 24px;
        line-height: 1.14;
        letter-spacing: 0;
        word-break: break-word;
      }

      .stat strong.accent {
        color: var(--accent);
      }

      .stat span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .table-wrap {
        max-height: 390px;
        overflow: auto;
      }

      table {
        width: 100%;
        min-width: 0;
        border-collapse: collapse;
      }

      th,
      td {
        border-top: 1px solid var(--line);
        padding: 12px 14px;
        text-align: left;
        white-space: nowrap;
      }

      th {
        position: sticky;
        z-index: 1;
        top: 0;
        color: var(--muted);
        background: #fbfcfa;
        font-size: 13px;
        font-weight: 720;
      }

      td {
        font-size: 14px;
        font-variant-numeric: tabular-nums;
      }

      .wide-table table {
        min-width: 1000px;
      }

      .chart-tools {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 20px 0;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .swatch {
        width: 18px;
        height: 10px;
        border-radius: 2px;
        background: var(--line);
      }

      .swatch.price {
        height: 3px;
        background: var(--primary);
      }

      .swatch.volume {
        background: rgba(60, 111, 159, 0.34);
      }

      .swatch.conversion {
        background: rgba(185, 92, 56, 0.72);
      }

      .swatch.pressure {
        background: rgba(161, 45, 42, 0.13);
      }

      .mini-tabs {
        display: inline-flex;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfa;
      }

      .mini-tabs button {
        min-height: 34px;
        border: 0;
        border-right: 1px solid var(--line);
        padding: 0 11px;
        color: var(--muted);
        background: transparent;
        cursor: pointer;
      }

      .mini-tabs button:last-child {
        border-right: 0;
      }

      .mini-tabs button.is-active {
        color: #fff;
        background: var(--primary);
      }

      .chart-frame {
        min-height: 390px;
        margin: 14px 20px 20px;
        overflow: auto hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .chart-frame svg {
        display: block;
        width: 100%;
        min-width: 920px;
        height: auto;
      }

      .axis-text {
        fill: #66736f;
        font-size: 12px;
      }

      .grid-line {
        stroke: #dce3de;
        stroke-dasharray: 4 4;
      }

      .axis {
        stroke: #aeb9b4;
      }

      .price-line {
        fill: none;
        stroke: var(--primary);
        stroke-width: 3;
      }

      .price-avg-line {
        fill: none;
        stroke: #7e8a84;
        stroke-dasharray: 7 5;
        stroke-width: 2;
      }

      .pressure-label {
        fill: #7a381f;
        font-size: 12px;
        font-weight: 760;
      }

      .connector {
        fill: none;
        stroke: var(--danger);
        stroke-width: 2;
        stroke-dasharray: 5 5;
        marker-end: url(#arrow);
      }

      .event-row {
        background: #fffaf6;
      }

      .signal {
        display: inline-flex;
        min-height: 24px;
        align-items: center;
        border-radius: 999px;
        padding: 3px 8px;
        color: #7a381f;
        background: #fff0e7;
        font-size: 12px;
        font-weight: 760;
      }

      .signal.neutral {
        color: var(--primary-strong);
        background: #e5f0ec;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      @media (max-width: 900px) {
        .shell {
          width: min(100% - 24px, 720px);
          padding: 24px 0;
        }

        .topbar,
        .panel-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .tool-grid {
          grid-template-columns: 1fr;
        }

        .stat-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 540px) {
        .shell {
          width: calc(100% - 20px);
          padding: 18px 0;
        }

        .tabs,
        .tab {
          width: 100%;
        }

        .tab {
          flex: 1;
        }

        .panel-pad,
        .panel-head {
          padding: 16px;
        }

        .stat-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .stat {
          min-height: 88px;
          padding: 13px;
        }

        .stat strong {
          font-size: 21px;
        }

        .chart-tools {
          padding: 14px 14px 0;
        }

        .chart-frame {
          margin: 12px 14px 16px;
        }

        .actions {
          flex-direction: column;
        }

        th,
        td {
          padding: 10px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M4 19V5"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="2"
              />
              <path
                d="M4 19h16"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-width="2"
              />
              <path
                d="M7 14l3-3 3 2 5-7"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
              />
            </svg>
          </span>
          <div>
            <h1>可转债工具台</h1>
            <p class="subtitle">下修底价计算与转股压力分析</p>
          </div>
        </div>

        <nav class="tabs" aria-label="功能切换">
          <button class="tab is-active" data-view="floorView" type="button">
            下修底价
          </button>
          <button class="tab" data-view="pressureView" type="button">
            转股压力
          </button>
        </nav>
      </header>

      <section class="view is-active" id="floorView">
        <div class="tool-grid">
          <form class="panel panel-pad" id="floorForm" autocomplete="off">
            <h2>下修底价计算</h2>

            <div class="field">
              <label for="floorSecurityInput">正股代码</label>
              <div class="search-wrap">
                <input
                  class="control search-input"
                  id="floorSecurityInput"
                  inputmode="search"
                  maxlength="20"
                  placeholder="输入正股/转债代码或名称"
                  aria-controls="floorSuggestions"
                  aria-expanded="false"
                />
                <svg
                  class="search-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  aria-hidden="true"
                >
                  <path
                    d="m21 21-4.2-4.2"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                  />
                  <circle
                    cx="11"
                    cy="11"
                    r="7"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                </svg>
                <div class="suggestions" id="floorSuggestions" role="listbox"></div>
              </div>
            </div>

            <div class="field">
              <label for="floorDateInput">基准日期</label>
              <input class="control" id="floorDateInput" type="date" />
            </div>

            <div class="actions">
              <button class="btn btn-primary" id="floorButton" type="submit">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M5 12h14"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                  />
                  <path
                    d="m13 6 6 6-6 6"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                  />
                </svg>
                <span>计算</span>
              </button>
            </div>

            <p class="message" id="floorMessage" aria-live="polite"></p>
          </form>

          <section class="panel" aria-live="polite">
            <div class="empty" id="floorEmpty">等待计算结果</div>

            <div id="floorResult" hidden>
              <div class="panel-head">
                <div>
                  <h2 id="floorName">-</h2>
                  <p id="floorMeta">-</p>
                </div>
                <span class="pill" id="floorBadge">已计算</span>
              </div>

              <div class="stat-grid">
                <div class="stat">
                  <p>前 20 交易日均价</p>
                  <strong id="avg20">-</strong>
                </div>
                <div class="stat">
                  <p>前 1 交易日均价</p>
                  <strong id="avg1">-</strong>
                </div>
                <div class="stat">
                  <p>下修底价</p>
                  <strong class="accent" id="floorPrice">-</strong>
                </div>
                <div class="stat">
                  <p>到底转股价值</p>
                  <strong class="accent" id="cbValue">-</strong>
                </div>
              </div>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>交易日期</th>
                      <th>成交量(万股)</th>
                      <th>成交额(万元)</th>
                    </tr>
                  </thead>
                  <tbody id="basisRows"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </section>

      <section class="view" id="pressureView">
        <div class="tool-grid">
          <form class="panel panel-pad" id="pressureForm" autocomplete="off">
            <h2>转股压力分析</h2>

            <div class="field">
              <label for="pressureStockInput">正股代码</label>
              <div class="search-wrap">
                <input
                  class="control search-input"
                  id="pressureStockInput"
                  inputmode="search"
                  maxlength="20"
                  placeholder="输入正股代码或名称"
                  aria-controls="pressureStockSuggestions"
                  aria-expanded="false"
                />
                <div
                  class="suggestions"
                  id="pressureStockSuggestions"
                  role="listbox"
                ></div>
              </div>
            </div>

            <div class="field">
              <label for="pressureBondInput">转债代码</label>
              <div class="search-wrap">
                <input
                  class="control search-input"
                  id="pressureBondInput"
                  inputmode="search"
                  maxlength="20"
                  placeholder="输入转债代码或名称"
                  aria-controls="pressureBondSuggestions"
                  aria-expanded="false"
                />
                <div
                  class="suggestions"
                  id="pressureBondSuggestions"
                  role="listbox"
                ></div>
              </div>
            </div>

            <div class="field">
              <label for="pressureStartInput">开始日期</label>
              <input
                class="control"
                id="pressureStartInput"
                type="date"
              />
            </div>

            <div class="actions">
              <button class="btn btn-primary" id="pressureButton" type="submit">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M5 12h14"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                  />
                  <path
                    d="m13 6 6 6-6 6"
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                  />
                </svg>
                <span>分析</span>
              </button>
            </div>

            <p class="message" id="pressureMessage" aria-live="polite"></p>
          </form>

          <section class="panel" aria-live="polite">
            <div class="empty" id="pressureEmpty">等待分析结果</div>

            <div id="pressureResult" hidden>
              <div class="panel-head">
                <div>
                  <h2 id="pressureName">-</h2>
                  <p id="pressureMeta">-</p>
                </div>
                <span class="pill" id="pressureBadge">真实数据源</span>
              </div>

              <div class="stat-grid">
                <div class="stat">
                  <p>最大新增转股日</p>
                  <strong id="peakDate">-</strong>
                  <span id="peakConversion">-</span>
                </div>
                <div class="stat">
                  <p>峰值后 5 日股价</p>
                  <strong id="postMove">-</strong>
                  <span id="postClose">-</span>
                </div>
                <div class="stat">
                  <p>峰值日成交量</p>
                  <strong id="volumeSpike">-</strong>
                  <span>相对前 5 日均量</span>
                </div>
                <div class="stat">
                  <p>滞后相关性</p>
                  <strong id="lagCorrelation">-</strong>
                  <span>新增转股 vs 次日收益</span>
                </div>
              </div>

              <div class="chart-tools">
                <div class="legend" aria-label="图例">
                  <span class="legend-item">
                    <span class="swatch price"></span>
                    正股收盘价
                  </span>
                  <span class="legend-item">
                    <span class="swatch volume"></span>
                    正股成交量
                  </span>
                  <span class="legend-item">
                    <span class="swatch conversion"></span>
                    新增转股
                  </span>
                  <span class="legend-item">
                    <span class="swatch pressure"></span>
                    压力窗口
                  </span>
                </div>

                <div class="mini-tabs" aria-label="图表视图">
                  <button class="is-active" type="button" data-chart-mode="all">
                    全量
                  </button>
                  <button type="button" data-chart-mode="pressure">
                    压力窗口
                  </button>
                </div>
              </div>

              <div class="chart-frame" id="pressureChart"></div>

              <div class="table-wrap wide-table">
                <table>
                  <thead>
                    <tr>
                      <th>交易日期</th>
                      <th>收盘价</th>
                      <th>涨跌幅</th>
                      <th>成交量(万股)</th>
                      <th>成交额(万元)</th>
                      <th>新增转股(万股)</th>
                      <th>转股价</th>
                      <th>量能倍数</th>
                      <th>信号</th>
                    </tr>
                  </thead>
                  <tbody id="pressureRows"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const appState = {
        securities: [],
        selectedSecurity: null,
        selectedPressureStock: null,
        selectedPressureBond: null,
        pressureRows: [],
        chartMode: "all",
      };

      function formatDateInputValue(date) {
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, "0"),
          String(date.getDate()).padStart(2, "0"),
        ].join("-");
      }

      function addMonthsClamped(date, months) {
        const next = new Date(date);
        const day = next.getDate();
        next.setDate(1);
        next.setMonth(next.getMonth() + months);
        const lastDay = new Date(
          next.getFullYear(),
          next.getMonth() + 1,
          0,
        ).getDate();
        next.setDate(Math.min(day, lastDay));
        return next;
      }

      const today = new Date();
      const todayText = formatDateInputValue(today);
      const oneMonthAgoText = formatDateInputValue(addMonthsClamped(today, -1));

      const tabs = document.querySelectorAll(".tab");
      const views = document.querySelectorAll(".view");

      const floorForm = document.querySelector("#floorForm");
      const floorSecurityInput = document.querySelector("#floorSecurityInput");
      const floorDateInput = document.querySelector("#floorDateInput");
      const floorSuggestions = document.querySelector("#floorSuggestions");
      const floorButton = document.querySelector("#floorButton");
      const floorMessage = document.querySelector("#floorMessage");
      const floorEmpty = document.querySelector("#floorEmpty");
      const floorResult = document.querySelector("#floorResult");
      const basisRows = document.querySelector("#basisRows");

      const pressureForm = document.querySelector("#pressureForm");
      const pressureStockInput = document.querySelector("#pressureStockInput");
      const pressureBondInput = document.querySelector("#pressureBondInput");
      const pressureStockSuggestions = document.querySelector(
        "#pressureStockSuggestions",
      );
      const pressureBondSuggestions = document.querySelector(
        "#pressureBondSuggestions",
      );
      const pressureStartInput = document.querySelector("#pressureStartInput");
      const pressureButton = document.querySelector("#pressureButton");
      const pressureMessage = document.querySelector("#pressureMessage");
      const pressureEmpty = document.querySelector("#pressureEmpty");
      const pressureResult = document.querySelector("#pressureResult");
      const pressureRows = document.querySelector("#pressureRows");
      const pressureChart = document.querySelector("#pressureChart");
      const pressureBadge = document.querySelector("#pressureBadge");
      const chartModeButtons = document.querySelectorAll("[data-chart-mode]");

      floorDateInput.value = todayText;
      pressureStartInput.value = oneMonthAgoText;

      function setMessage(node, text, type = "info") {
        node.textContent = text;
        node.classList.toggle("is-visible", Boolean(text));
        node.classList.toggle("is-error", type === "error");
      }

      function setButtonLoading(button, text, loadingText, isLoading) {
        button.disabled = isLoading;
        button.querySelector("span").textContent = isLoading ? loadingText : text;
      }

      function formatNumber(value, digits = 2) {
        return Number(value || 0).toLocaleString("zh-CN", {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits,
        });
      }

      function switchView(viewId) {
        tabs.forEach((tab) =>
          tab.classList.toggle("is-active", tab.dataset.view === viewId),
        );
        views.forEach((view) =>
          view.classList.toggle("is-active", view.id === viewId),
        );
      }

      async function loadSecurities() {
        try {
          const response = await fetch("/data/convertible_bond_stocks.json", {
            cache: "force-cache",
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          appState.securities = data
            .filter((item) => item && item.code && item.name)
            .map((item) => ({
              code: String(item.code),
              name: String(item.name),
              exchange: item.exchange || "",
              bonds: Array.isArray(item.bonds)
                ? item.bonds
                    .filter((bond) => bond && bond.code && bond.name)
                    .map((bond) => ({
                      code: String(bond.code),
                      name: String(bond.name),
                      exchange: bond.exchange || "",
                    }))
                : [],
            }));
          syncPressureSelections();
        } catch (error) {
          setMessage(
            floorMessage,
            "代码列表加载失败，可直接输入 6 位代码。",
            "error",
          );
        }
      }

      function getBonds(item) {
        return Array.isArray(item.bonds) ? item.bonds : [];
      }

      function lowerText(value) {
        return String(value || "").toLowerCase();
      }

      function marketLabel(exchange) {
        if (exchange === "SSE") {
          return "沪市";
        }
        if (exchange === "SZSE") {
          return "深市";
        }
        return "正股";
      }

      function findExactSecurity(value) {
        const keyword = lowerText(value.trim());
        if (!keyword) {
          return null;
        }
        return (
          appState.securities.find(
            (item) =>
              lowerText(item.code) === keyword ||
              lowerText(item.name) === keyword ||
              getBonds(item).some(
                (bond) =>
                  lowerText(bond.code) === keyword ||
                  lowerText(bond.name) === keyword,
              ),
          ) || null
        );
      }

      function bondEntries(stocks = appState.securities) {
        return stocks.flatMap((stock) =>
          getBonds(stock).map((bond) => ({
            stock,
            bond,
          })),
        );
      }

      function findExactPressureStock(value) {
        const keyword = lowerText(value.trim());
        if (!keyword) {
          return null;
        }
        return (
          appState.securities.find(
            (stock) =>
              lowerText(stock.code) === keyword ||
              lowerText(stock.name) === keyword,
          ) || null
        );
      }

      function findExactPressureBond(value) {
        const keyword = lowerText(value.trim());
        if (!keyword) {
          return null;
        }
        return (
          bondEntries().find(
            ({ bond }) =>
              lowerText(bond.code) === keyword ||
              lowerText(bond.name) === keyword,
          ) || null
        );
      }

      function activePressureStock() {
        const exact = findExactPressureStock(pressureStockInput.value);
        if (exact) {
          return exact;
        }
        if (
          appState.selectedPressureStock &&
          (pressureStockInput.value.trim() ===
            appState.selectedPressureStock.code ||
            pressureStockInput.value.trim() ===
              appState.selectedPressureStock.name)
        ) {
          return appState.selectedPressureStock;
        }
        return null;
      }

      function pressureStockMatches(stock, keyword) {
        return (
          lowerText(stock.code).includes(keyword) ||
          lowerText(stock.name).includes(keyword)
        );
      }

      function findPressureStockMatches(value) {
        const keyword = lowerText(value.trim());
        if (!keyword) {
          return appState.securities;
        }
        return appState.securities.filter((stock) =>
          pressureStockMatches(stock, keyword),
        );
      }

      function bondMatchScore(entry, keyword) {
        const bondCode = lowerText(entry.bond.code);
        const bondName = lowerText(entry.bond.name);
        const stockCode = lowerText(entry.stock.code);
        const stockName = lowerText(entry.stock.name);

        if (bondCode === keyword) {
          return 0;
        }
        if (bondCode.startsWith(keyword)) {
          return 1;
        }
        if (bondName.includes(keyword)) {
          return 2;
        }
        if (stockCode.startsWith(keyword)) {
          return 3;
        }
        if (stockName.includes(keyword)) {
          return 4;
        }
        return Number.POSITIVE_INFINITY;
      }

      function findPressureBondMatches(value) {
        const keyword = lowerText(value.trim());
        const stock = activePressureStock();
        if (!keyword) {
          return bondEntries(stock ? [stock] : appState.securities);
        }

        const scoreEntries = (source) =>
          source
          .map((entry) => ({
            ...entry,
            score: bondMatchScore(entry, keyword),
          }))
          .filter((entry) => Number.isFinite(entry.score))
          .sort(
            (a, b) =>
              a.score - b.score ||
              a.bond.code.localeCompare(b.bond.code),
          );
        return scoreEntries(bondEntries());
      }

      function findPressureBondFocusMatches() {
        const stock = activePressureStock();
        if (stock) {
          return bondEntries([stock]);
        }
        return findPressureBondMatches(pressureBondInput.value);
      }

      function closeSuggestionNode(suggestions, input) {
        suggestions.classList.remove("is-open");
        input.setAttribute("aria-expanded", "false");
      }

      function closeAllSuggestions() {
        closeSuggestionNode(floorSuggestions, floorSecurityInput);
        closeSuggestionNode(pressureStockSuggestions, pressureStockInput);
        closeSuggestionNode(pressureBondSuggestions, pressureBondInput);
      }

      function syncPressureSelections() {
        const stock = findExactPressureStock(pressureStockInput.value);
        const bondEntry = findExactPressureBond(pressureBondInput.value);
        if (stock) {
          appState.selectedPressureStock = stock;
        }
        if (bondEntry) {
          appState.selectedPressureBond = bondEntry;
          if (!stock || stock.code !== bondEntry.stock.code) {
            appState.selectedPressureStock = bondEntry.stock;
            pressureStockInput.value = bondEntry.stock.code;
          }
        }
      }

      function choosePressureStock(stock) {
        appState.selectedPressureStock = stock;
        pressureStockInput.value = stock.code;
        closeSuggestionNode(pressureStockSuggestions, pressureStockInput);

        const bonds = getBonds(stock);
        const currentBond = findExactPressureBond(pressureBondInput.value);
        if (currentBond && currentBond.stock.code === stock.code) {
          appState.selectedPressureBond = currentBond;
          return;
        }

        if (bonds.length > 0) {
          defaultPressureBondForStock(stock);
          closeAllSuggestions();
          return;
        }

        appState.selectedPressureBond = null;
        pressureBondInput.value = "";
        renderPressureBondSuggestions(findPressureBondMatches(""));
        pressureBondInput.focus();
      }

      function defaultPressureBondForStock(stock) {
        const bonds = getBonds(stock);
        const currentBond = findExactPressureBond(pressureBondInput.value);
        if (currentBond && currentBond.stock.code === stock.code) {
          appState.selectedPressureBond = currentBond;
          return;
        }
        if (bonds.length > 0) {
          appState.selectedPressureBond = { stock, bond: bonds[0] };
          pressureBondInput.value = bonds[0].code;
        }
      }

      function choosePressureBond(entry) {
        appState.selectedPressureBond = entry;
        appState.selectedPressureStock = entry.stock;
        pressureBondInput.value = entry.bond.code;
        pressureStockInput.value = entry.stock.code;
        closeAllSuggestions();
      }

      function renderPressureStockSuggestions(stocks) {
        pressureStockSuggestions.replaceChildren();
        stocks.forEach((stock) => {
          const option = document.createElement("button");
          const code = document.createElement("span");
          const name = document.createElement("span");
          const tag = document.createElement("span");

          option.type = "button";
          option.className = "suggestion";
          option.setAttribute("role", "option");

          code.className = "suggestion-code";
          code.textContent = stock.code;
          name.className = "suggestion-name";
          name.textContent = stock.name;
          tag.className = "tag";
          tag.textContent = marketLabel(stock.exchange);

          option.append(code, name, tag);
          option.addEventListener("click", () => choosePressureStock(stock));
          pressureStockSuggestions.appendChild(option);
        });

        pressureStockSuggestions.classList.toggle("is-open", stocks.length > 0);
        pressureStockInput.setAttribute("aria-expanded", String(stocks.length > 0));
      }

      function renderPressureBondSuggestions(entries) {
        pressureBondSuggestions.replaceChildren();
        entries.forEach((entry) => {
          const option = document.createElement("button");
          const code = document.createElement("span");
          const main = document.createElement("span");
          const name = document.createElement("span");
          const detail = document.createElement("span");
          const tag = document.createElement("span");

          option.type = "button";
          option.className = "suggestion has-detail";
          option.setAttribute("role", "option");

          code.className = "suggestion-code";
          code.textContent = entry.bond.code;
          main.className = "suggestion-main";
          name.className = "suggestion-name";
          name.textContent = entry.bond.name;
          detail.className = "suggestion-detail";
          detail.textContent = `${entry.stock.code} ${entry.stock.name}`;
          tag.className = "tag";
          tag.textContent = marketLabel(entry.bond.exchange || entry.stock.exchange);

          main.append(name, detail);
          option.append(code, main, tag);
          option.addEventListener("click", () => choosePressureBond(entry));
          pressureBondSuggestions.appendChild(option);
        });

        pressureBondSuggestions.classList.toggle("is-open", entries.length > 0);
        pressureBondInput.setAttribute("aria-expanded", String(entries.length > 0));
      }

      function resolvePressureStockCode() {
        const exact = findExactPressureStock(pressureStockInput.value);
        if (exact) {
          appState.selectedPressureStock = exact;
          return exact.code;
        }
        if (
          appState.selectedPressureStock &&
          (pressureStockInput.value.trim() ===
            appState.selectedPressureStock.code ||
            pressureStockInput.value.trim() ===
              appState.selectedPressureStock.name)
        ) {
          return appState.selectedPressureStock.code;
        }
        const entered = pressureStockInput.value.trim();
        return /^\d{6}$/.test(entered) ? entered : "";
      }

      function resolvePressureBondCode() {
        const exact = findExactPressureBond(pressureBondInput.value);
        if (exact) {
          appState.selectedPressureBond = exact;
          appState.selectedPressureStock = exact.stock;
          pressureBondInput.value = exact.bond.code;
          pressureStockInput.value = exact.stock.code;
          return exact.bond.code;
        }
        if (
          appState.selectedPressureBond &&
          (pressureBondInput.value.trim() ===
            appState.selectedPressureBond.bond.code ||
            pressureBondInput.value.trim() ===
              appState.selectedPressureBond.bond.name)
        ) {
          return appState.selectedPressureBond.bond.code;
        }
        const entered = pressureBondInput.value.trim();
        return /^\d{6}$/.test(entered) ? entered : "";
      }

      function matchScore(item, keyword, matchedBond) {
        const code = lowerText(item.code);
        const name = lowerText(item.name);
        if (code === keyword) {
          return 0;
        }
        if (matchedBond && lowerText(matchedBond.code) === keyword) {
          return 1;
        }
        if (code.startsWith(keyword)) {
          return 2;
        }
        if (name.includes(keyword)) {
          return 3;
        }
        if (matchedBond && lowerText(matchedBond.code).startsWith(keyword)) {
          return 4;
        }
        if (matchedBond) {
          return 5;
        }
        return Number.POSITIVE_INFINITY;
      }

      function findMatches(value) {
        const keyword = value.trim().toLowerCase();
        const source = appState.securities;
        if (!keyword) {
          return source.map((item) => ({
            item,
            matchedBond: null,
          }));
        }

        return source
          .map((item) => {
            const matchedBond =
              getBonds(item).find(
                (bond) =>
                  lowerText(bond.code).includes(keyword) ||
                  lowerText(bond.name).includes(keyword),
              ) || null;
            return {
              item,
              matchedBond,
              score: matchScore(item, keyword, matchedBond),
            };
          })
          .filter((match) => Number.isFinite(match.score))
          .sort(
            (a, b) =>
              a.score - b.score || a.item.code.localeCompare(b.item.code),
          );
      }

      function renderSuggestions(matches) {
        floorSuggestions.replaceChildren();
        matches.forEach((match) => {
          const item = match.item;
          const option = document.createElement("button");
          const code = document.createElement("span");
          const name = document.createElement("span");
          const tag = document.createElement("span");

          option.type = "button";
          option.className = "suggestion";
          option.setAttribute("role", "option");

          code.className = "suggestion-code";
          code.textContent = item.code;
          name.className = "suggestion-name";
          name.textContent = item.name;
          tag.className = "tag";
          tag.textContent = marketLabel(item.exchange);

          option.append(code, name, tag);
          option.addEventListener("click", () => chooseSecurity(item));
          floorSuggestions.appendChild(option);
        });

        floorSuggestions.classList.toggle("is-open", matches.length > 0);
        floorSecurityInput.setAttribute("aria-expanded", String(matches.length > 0));
      }

      function chooseSecurity(item) {
        appState.selectedSecurity = item;
        floorSecurityInput.value = item.code;
        floorSuggestions.classList.remove("is-open");
        floorSecurityInput.setAttribute("aria-expanded", "false");
      }

      function resolveFloorCode() {
        const entered = floorSecurityInput.value.trim();
        const exact = findExactSecurity(entered);
        if (exact) {
          appState.selectedSecurity = exact;
          return exact.code;
        }

        if (
          appState.selectedSecurity &&
          (entered === appState.selectedSecurity.name ||
            entered === appState.selectedSecurity.code ||
            getBonds(appState.selectedSecurity).some(
              (bond) => entered === bond.code || entered === bond.name,
            ))
        ) {
          return appState.selectedSecurity.code;
        }

        return /^\d{6}$/.test(entered) ? entered : "";
      }

      async function calculateFloor() {
        const code = resolveFloorCode();
        if (!code) {
          setMessage(floorMessage, "请输入 6 位正股代码。", "error");
          return;
        }

        setButtonLoading(floorButton, "计算", "计算中", true);
        setMessage(floorMessage, "");

        try {
          const params = new URLSearchParams({
            code,
            date: floorDateInput.value || todayText,
          });
          const response = await fetch(`/api/calculate?${params}`);
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "计算失败");
          }

          const matched = appState.securities.find((item) => item.code === code);
          if (matched) {
            chooseSecurity(matched);
          } else {
            floorSecurityInput.value = code;
          }

          updateFloorResult(data);
        } catch (error) {
          setMessage(
            floorMessage,
            error.message || "计算失败，请稍后重试。",
            "error",
          );
        } finally {
          setButtonLoading(floorButton, "计算", "计算中", false);
        }
      }

      function updateFloorResult(data) {
        floorEmpty.hidden = true;
        floorResult.hidden = false;

        document.querySelector("#floorName").textContent = data.name || data.code;
        document.querySelector("#floorMeta").textContent = [
          data.code,
          `基准日 ${data.baseDate || floorDateInput.value}`,
          `前一交易日 ${data.previousTradeDate}`,
        ].join(" · ");
        document.querySelector("#avg20").textContent = data.avg20;
        document.querySelector("#avg1").textContent = data.avg1;
        document.querySelector("#floorPrice").textContent = data.floorPrice;
        document.querySelector("#cbValue").textContent = data.cbValue;
        renderBasisRows(data.tableRows || []);
      }

      function renderBasisRows(rows) {
        basisRows.replaceChildren();
        if (rows.length === 0) {
          const row = document.createElement("tr");
          const cell = document.createElement("td");
          cell.colSpan = 3;
          cell.textContent = "暂无成交数据";
          row.appendChild(cell);
          basisRows.appendChild(row);
          return;
        }

        rows.forEach((item) => {
          const row = document.createElement("tr");
          [item.date, item.volume, item.amount].forEach((value) => {
            const cell = document.createElement("td");
            cell.textContent = value || "-";
            row.appendChild(cell);
          });
          basisRows.appendChild(row);
        });
      }

      async function analyzePressure() {
        const bond = resolvePressureBondCode();
        const stock = resolvePressureStockCode();
        const start = pressureStartInput.value;

        if (!/^\d{6}$/.test(stock)) {
          setMessage(pressureMessage, "请输入 6 位正股代码。", "error");
          return;
        }
        if (!/^\d{6}$/.test(bond)) {
          setMessage(pressureMessage, "请输入 6 位转债代码。", "error");
          return;
        }

        setButtonLoading(pressureButton, "分析", "分析中", true);
        setMessage(pressureMessage, "");
        pressureEmpty.textContent = "正在读取真实数据源...";
        pressureEmpty.hidden = false;
        pressureResult.hidden = true;

        try {
          const params = new URLSearchParams({ stock, bond, start });
          const response = await fetch(`/api/conversion-pressure?${params}`);
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "分析失败");
          }

          appState.pressureRows = enrichPressureRows(data.rows || []);
          updatePressureResult(data);
        } catch (error) {
          setMessage(
            pressureMessage,
            error.message || "分析失败，请稍后重试。",
            "error",
          );
          pressureEmpty.textContent = "等待分析结果";
          pressureEmpty.hidden = false;
          pressureResult.hidden = true;
        } finally {
          setButtonLoading(pressureButton, "分析", "分析中", false);
        }
      }

      function movingAverage(rows, index, field, windowSize) {
        const start = Math.max(0, index - windowSize + 1);
        const sample = rows.slice(start, index + 1);
        const sum = sample.reduce((total, row) => total + Number(row[field] || 0), 0);
        return sample.length ? sum / sample.length : 0;
      }

      function correlation(xValues, yValues) {
        const pairs = xValues
          .map((x, index) => [x, yValues[index]])
          .filter(([x, y]) => Number.isFinite(x) && Number.isFinite(y));
        if (pairs.length < 2) {
          return 0;
        }

        const xAvg = pairs.reduce((total, [x]) => total + x, 0) / pairs.length;
        const yAvg = pairs.reduce((total, [, y]) => total + y, 0) / pairs.length;
        const numerator = pairs.reduce(
          (total, [x, y]) => total + (x - xAvg) * (y - yAvg),
          0,
        );
        const xDenominator = Math.sqrt(
          pairs.reduce((total, [x]) => total + (x - xAvg) ** 2, 0),
        );
        const yDenominator = Math.sqrt(
          pairs.reduce((total, [, y]) => total + (y - yAvg) ** 2, 0),
        );
        return numerator / (xDenominator * yDenominator || 1);
      }

      function enrichPressureRows(rows) {
        return rows.map((row, index) => {
          const previous = rows[index - 1] || row;
          const avgVolume = movingAverage(rows, Math.max(index - 1, 0), "volume", 5);
          const avgAmount = movingAverage(rows, Math.max(index - 1, 0), "amount", 5);
          const avgConversion = movingAverage(
            rows,
            Math.max(index - 1, 0),
            "conversion",
            5,
          );
          const dayReturn = previous.close ? (row.close - previous.close) / previous.close : 0;
          const volumeRatio = avgVolume ? row.volume / avgVolume : 1;
          const amountRatio = avgAmount ? row.amount / avgAmount : 1;
          const conversionRatio = avgConversion ? row.conversion / avgConversion : 1;
          const isHighConversion = row.conversion >= 100 || conversionRatio >= 4;
          const isPriceWeak = row.pctChange <= -3 || dayReturn <= -0.03;

          return {
            ...row,
            dayReturn,
            volumeRatio,
            amountRatio,
            conversionRatio,
            isPressure: isHighConversion && isPriceWeak,
          };
        });
      }

      function updatePressureResult(data) {
        pressureEmpty.hidden = true;
        pressureResult.hidden = false;
        const marketLabel = data.market === "SSE" ? "上交所" : "深交所";

        document.querySelector("#pressureName").textContent =
          `${data.stockName || data.stockCode} / ${data.bondName || data.bondCode}`;
        pressureBadge.textContent = `${marketLabel}真实数据`;
        document.querySelector("#pressureMeta").textContent = [
          marketLabel,
          `正股 ${data.stockCode}`,
          `转债 ${data.bondCode}`,
          `${data.startDate} 至 ${data.endDate}`,
        ].join(" · ");

        renderPressureSummary(data);
        renderPressureChart(appState.chartMode);
        renderPressureRows();
      }

      function renderPressureSummary(data) {
        const rows = appState.pressureRows;
        if (rows.length === 0) {
          return;
        }

        const peak = rows.reduce((best, row) =>
          row.conversion > best.conversion ? row : best,
        );
        const peakIndex = rows.findIndex((row) => row.date === peak.date);
        const post = rows[Math.min(rows.length - 1, peakIndex + 5)];
        const postMove = peak.close ? ((post.close - peak.close) / peak.close) * 100 : 0;
        const nextDayReturns = rows.slice(0, -1).map((row, index) => {
          const next = rows[index + 1];
          return row.close ? (next.close - row.close) / row.close : 0;
        });
        const corr = correlation(
          rows.slice(0, -1).map((row) => row.conversion),
          nextDayReturns,
        );

        document.querySelector("#peakDate").textContent = peak.date.slice(5);
        document.querySelector("#peakConversion").textContent =
          `${data.bondName || data.bondCode} ${formatNumber(peak.conversion)} 万股`;
        document.querySelector("#postMove").textContent =
          `${postMove >= 0 ? "+" : ""}${postMove.toFixed(2)}%`;
        document.querySelector("#postClose").textContent =
          `${post.date.slice(5)} 收盘 ${post.close.toFixed(2)} 元`;
        document.querySelector("#volumeSpike").textContent =
          `${peak.volumeRatio.toFixed(2)}x`;
        document.querySelector("#lagCorrelation").textContent = corr.toFixed(2);
      }

      function renderPressureChart(mode = "all") {
        const sourceRows = appState.pressureRows;
        const visibleRows =
          mode === "pressure"
            ? sourceRows.filter(
                (row, index) =>
                  row.isPressure ||
                  sourceRows[index - 1]?.isPressure ||
                  sourceRows[index + 1]?.isPressure,
              )
            : sourceRows;

        if (visibleRows.length === 0) {
          pressureChart.innerHTML = '<div class="empty">暂无可绘制的数据</div>';
          return;
        }

        const width = 980;
        const height = 390;
        const margin = { top: 30, right: 58, bottom: 56, left: 58 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const priceMin = Math.min(...visibleRows.map((row) => row.close)) * 0.985;
        const priceMax = Math.max(...visibleRows.map((row) => row.close)) * 1.015;
        const volumeMax = Math.max(1, ...visibleRows.map((row) => row.volume));
        const conversionMax = Math.max(1, ...visibleRows.map((row) => row.conversion));
        const band = innerWidth / visibleRows.length;

        const x = (index) =>
          margin.left + (innerWidth * index) / Math.max(1, visibleRows.length - 1);
        const yPrice = (value) =>
          margin.top +
          innerHeight -
          ((value - priceMin) / (priceMax - priceMin || 1)) * innerHeight;
        const yVolume = (value) =>
          margin.top + innerHeight - (value / volumeMax) * innerHeight * 0.42;
        const yConversion = (value) =>
          margin.top + innerHeight - (value / conversionMax) * innerHeight * 0.78;

        const pricePath = visibleRows
          .map((row, index) => `${index === 0 ? "M" : "L"} ${x(index)} ${yPrice(row.close)}`)
          .join(" ");
        const avgPath = visibleRows
          .map((row, index) => {
            const avg = movingAverage(visibleRows, index, "close", 5);
            return `${index === 0 ? "M" : "L"} ${x(index)} ${yPrice(avg)}`;
          })
          .join(" ");
        const gridValues = Array.from(
          { length: 5 },
          (_, index) => priceMin + ((priceMax - priceMin) * index) / 4,
        );
        const pressureIndexes = visibleRows
          .map((row, index) => (row.isPressure ? index : -1))
          .filter((index) => index >= 0);
        const peakIndex = visibleRows.findIndex(
          (row) =>
            row.conversion === Math.max(...visibleRows.map((item) => item.conversion)),
        );
        const lagIndex = Math.min(visibleRows.length - 1, peakIndex + 3);

        pressureChart.innerHTML = `
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="正股收盘价、成交量和新增转股数量同轴图">
            <defs>
              <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
                <path d="M0,0 L9,4.5 L0,9 z" fill="#a12d2a"></path>
              </marker>
            </defs>
            ${visibleRows
              .map((row, index) =>
                row.isPressure
                  ? `<rect x="${x(index) - band / 2}" y="${margin.top}" width="${band}" height="${innerHeight}" fill="rgba(161,45,42,0.13)"></rect>`
                  : "",
              )
              .join("")}
            ${gridValues
              .map(
                (value) => `
                  <line class="grid-line" x1="${margin.left}" x2="${width - margin.right}" y1="${yPrice(value)}" y2="${yPrice(value)}"></line>
                  <text class="axis-text" x="${margin.left - 10}" y="${yPrice(value) + 4}" text-anchor="end">${value.toFixed(2)}</text>
                `,
              )
              .join("")}
            <line class="axis" x1="${margin.left}" x2="${width - margin.right}" y1="${margin.top + innerHeight}" y2="${margin.top + innerHeight}"></line>
            ${visibleRows
              .map((row, index) => {
                const barHeight = margin.top + innerHeight - yVolume(row.volume);
                return `<rect x="${x(index) - band * 0.34}" y="${yVolume(row.volume)}" width="${band * 0.26}" height="${barHeight}" rx="2" fill="rgba(60,111,159,0.34)"></rect>`;
              })
              .join("")}
            ${visibleRows
              .map((row, index) => {
                const barHeight = margin.top + innerHeight - yConversion(row.conversion);
                return `<rect x="${x(index) + band * 0.06}" y="${yConversion(row.conversion)}" width="${band * 0.28}" height="${barHeight}" rx="2" fill="rgba(185,92,56,0.72)"></rect>`;
              })
              .join("")}
            <path class="price-avg-line" d="${avgPath}"></path>
            <path class="price-line" d="${pricePath}"></path>
            ${visibleRows
              .map((row, index) => `<circle cx="${x(index)}" cy="${yPrice(row.close)}" r="3.4" fill="#186b5f"></circle>`)
              .join("")}
            ${pressureIndexes
              .map((index) => `<text class="pressure-label" x="${x(index)}" y="${margin.top + 16}" text-anchor="middle">压力</text>`)
              .join("")}
            ${
              peakIndex >= 0 && lagIndex > peakIndex
                ? `<path class="connector" d="M ${x(peakIndex)} ${yConversion(visibleRows[peakIndex].conversion) - 12} C ${x(peakIndex) + 48} ${yConversion(visibleRows[peakIndex].conversion) - 54}, ${x(lagIndex) - 48} ${yPrice(visibleRows[lagIndex].close) - 42}, ${x(lagIndex)} ${yPrice(visibleRows[lagIndex].close) - 10}"></path>
                   <text class="pressure-label" x="${(x(peakIndex) + x(lagIndex)) / 2}" y="${Math.min(yConversion(visibleRows[peakIndex].conversion), yPrice(visibleRows[lagIndex].close)) - 46}" text-anchor="middle">滞后观察</text>`
                : ""
            }
            ${visibleRows
              .map((row, index) =>
                index % Math.max(1, Math.ceil(visibleRows.length / 8)) === 0
                  ? `<text class="axis-text" x="${x(index)}" y="${height - 24}" text-anchor="middle">${row.date.slice(5)}</text>`
                  : "",
              )
              .join("")}
            <text class="axis-text" x="${margin.left - 40}" y="${margin.top - 10}">价格(元)</text>
            <text class="axis-text" x="${width - margin.right}" y="${margin.top - 10}" text-anchor="end">柱形：成交量 / 新增转股</text>
          </svg>
        `;
      }

      function renderPressureRows() {
        pressureRows.replaceChildren();
        appState.pressureRows
          .filter(
            (row) =>
              row.isPressure ||
              row.conversionFaceAmount > 0 ||
              Math.abs(row.pctChange) >= 5,
          )
          .forEach((row) => {
            const tr = document.createElement("tr");
            tr.className = row.isPressure ? "event-row" : "";
            [
              row.date,
              row.close.toFixed(2),
              `${row.pctChange >= 0 ? "+" : ""}${row.pctChange.toFixed(2)}%`,
              formatNumber(row.volume, 0),
              formatNumber(row.amount, 0),
              formatNumber(row.conversion),
              row.conversionPrice ? row.conversionPrice.toFixed(2) : "-",
              `${row.volumeRatio.toFixed(2)}x`,
            ].forEach((value) => {
              const td = document.createElement("td");
              td.textContent = value;
              tr.appendChild(td);
            });

            const signalCell = document.createElement("td");
            const signal = document.createElement("span");
            signal.className = row.isPressure ? "signal" : "signal neutral";
            signal.textContent = row.isPressure
              ? "压力窗口"
              : row.conversionFaceAmount > 0
                ? "转股记录"
                : "价格异动";
            signalCell.appendChild(signal);
            tr.appendChild(signalCell);

            pressureRows.appendChild(tr);
          });
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => switchView(tab.dataset.view));
      });

      floorSecurityInput.addEventListener("input", (event) => {
        const value = event.target.value;
        const exact = findExactSecurity(value);
        if (exact) {
          appState.selectedSecurity = exact;
        }
        renderSuggestions(findMatches(value));
      });

      floorSecurityInput.addEventListener("focus", () => {
        renderSuggestions(findMatches(floorSecurityInput.value));
      });

      pressureStockInput.addEventListener("input", (event) => {
        const value = event.target.value;
        const exact = findExactPressureStock(value);
        appState.selectedPressureStock = exact;
        if (exact) {
          defaultPressureBondForStock(exact);
        }
        renderPressureStockSuggestions(findPressureStockMatches(value));
      });

      pressureStockInput.addEventListener("focus", () => {
        renderPressureStockSuggestions(
          findPressureStockMatches(pressureStockInput.value),
        );
      });

      pressureBondInput.addEventListener("input", (event) => {
        const value = event.target.value;
        const exact = findExactPressureBond(value);
        if (exact) {
          appState.selectedPressureBond = exact;
          appState.selectedPressureStock = exact.stock;
          pressureStockInput.value = exact.stock.code;
        }
        renderPressureBondSuggestions(findPressureBondMatches(value));
      });

      pressureBondInput.addEventListener("focus", () => {
        renderPressureBondSuggestions(
          findPressureBondFocusMatches(),
        );
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".search-wrap")) {
          closeAllSuggestions();
        }
      });

      floorForm.addEventListener("submit", (event) => {
        event.preventDefault();
        calculateFloor();
      });

      pressureForm.addEventListener("submit", (event) => {
        event.preventDefault();
        analyzePressure();
      });

      chartModeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          chartModeButtons.forEach((item) => item.classList.remove("is-active"));
          button.classList.add("is-active");
          appState.chartMode = button.dataset.chartMode;
          renderPressureChart(appState.chartMode);
        });
      });

      loadSecurities();
    </script>
  </body>
</html>
